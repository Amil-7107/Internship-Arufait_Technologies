<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade Generator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>Grade Generator</h1>

        <input type="number" id="marks" placeholder="Enter Marks (0-100)">

        <button onclick="generateGrade()">Generate Grade</button>

        <div class="result">
            <h2 id="grade"></h2>
        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
